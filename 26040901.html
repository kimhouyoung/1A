    <!-- 5. [실기: 복합 테이블 구조 설계]
다음 실행 결과와 동일한 구조를 갖는 테이블 HTML 코드를 작성하시오.

조건 1: 전체는 4행 3열의 크기를 가짐.

조건 2: 1행의 모든 셀(3칸)을 하나로 합쳐 제목 행으로 만듦.

조건 3: 2행 1열과 3행 1열을 하나로 합침 (세로 병합).

조건 4: 4행 2열과 4행 3열을 하나로 합침 (가로 병합).

조건 5: 제목은 <th>, 내용은 <td>를 사용함.

코드 작성: -->
<table border="1">
    <tr>
        <th colspan="3">집 존나 가고싶다</th>
    </tr>
    <tr>
        <td rowspan="2">아ㅏ</td>
        <td>이이ㅣㅇ</td>
        <td>우우ㅜ</td>
    </tr>   
    <tr>
        <td>이이ㅣㅇ</td>
        <td>우우ㅜ</td>
    </tr>
    <tr>
        <td>dppppp</td>
        <td colspan="2">이이ㅣㅇ</td>
    </tr>
</table>
</body>
