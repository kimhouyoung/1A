    <h3>입장권의 종류</h3>

        <li>예메권</li>
        <li>현장구매권</li>
        <li>암표</li>

    <h3>순서있는 리스트</h3>
    <h3>리먄을 맛있게 끓여서 먹는 방법</h3>
    <ol>
        <li>물을 끓인다</li>
        <li>물이 끓으면 스프를 넣는다</li>
        <li>면을 넣는다</li>
        <li>라면봉지에 설명되어 있는 시간만큼 정확히 끓인다.</li>
        <li>맛있게 먹는다.</li>
    </ol>
